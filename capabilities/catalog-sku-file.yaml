        call: catalog-sku-file.post
        with:
          skuId: rest.skuId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: VTex Delete all SKU files
        call: catalog-sku-file.delete
        with:
          skuId: rest.skuId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/catalog/pvt/stockkeepingunit/{skuid}/file/{skufileid}
