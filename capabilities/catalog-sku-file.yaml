        call: catalog-sku-file.put
        with:
          skuId: rest.skuId
          skuFileId: rest.skuFileId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: VTex Delete SKU image file
        call: catalog-sku-file.delete
        with:
          skuId: rest.skuId
          skuFileId: rest.skuFileId
        outputParameters:
        - type: object
          mapping: $.
