          description: HTTP Client Negotiation Accept Header. Indicates the types of responses the client can understand.
          required: true
        - name: changeOrderId
          in: path
          type: string
          description: Order ID of the order you wish to change.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
