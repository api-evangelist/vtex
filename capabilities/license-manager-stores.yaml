naftiko: 1.0.0-alpha2
info:
  label: VTex License Manager API — Stores
  description: 'VTex License Manager API — Stores. 1 operations. Lead operation: VTex Get stores. Self-contained Naftiko capability
    covering one Vtex business surface.'
  tags:
  - Vtex
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VTEX_API_KEY: VTEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: license-manager-stores
    baseUri: https://{accountName}.{environment}.com.br
    description: VTex License Manager API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: api-vlm-account-stores
      path: /api/vlm/account/stores
      operations:
      - name: getbyaccount
        method: GET
        description: VTex Get stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-VTEX-API-AppKey
      value: '{{env.VTEX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: license-manager-stores-rest
    port: 8080
    description: REST adapter for VTex License Manager API — Stores. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/vlm/account/stores
      name: api-vlm-account-stores
      description: REST surface for api-vlm-account-stores.
      operations:
      - method: GET
        name: getbyaccount
        description: VTex Get stores
        call: license-manager-stores.getbyaccount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: license-manager-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for VTex License Manager API — Stores. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: vtex-get-stores
      description: VTex Get stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: license-manager-stores.getbyaccount
      outputParameters:
      - type: object
        mapping: $.
