      path: /api/catalog_system/pvt/sku/stockkeepingunitids
      operations:
      - name: listallskuids
        method: GET
        description: VTex List all SKU IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Number of the page from where you need to retrieve SKU IDs.
          required: true
        - name: pagesize
          in: query
          type: integer
          description: Size of the page from where you need retrieve SKU IDs. The maximum value is `1000`.
          required: true
    authentication:
      type: apikey
      key: X-VTEX-API-AppKey
      value: '{{env.VTEX_API_KEY}}'
