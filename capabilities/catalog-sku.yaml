      path: /api/catalog/pvt/stockkeepingunit
      operations:
      - name: get
        method: GET
        description: VTex Get SKU by RefId
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: RefId
          in: query
          type: string
          description: SKU reference ID.
          required: true
      - name: post
        method: POST
        description: VTex Create SKU
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-catalog-pvt-stockkeepingunit-skuId
      path: /api/catalog/pvt/stockkeepingunit/{skuId}
      operations:
      - name: sku
        method: GET
        description: VTex Get SKU
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skuId
          in: path
          type: integer
          description: SKU unique identifier number.
          required: true
      - name: put
        method: PUT
        description: VTex Update SKU
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skuId
          in: path
          type: integer
          description: SKU's unique numerical identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
