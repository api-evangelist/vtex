      path: /api/catalog_system/pub/sku/stockkeepingunitidsbyrefids
      operations:
      - name: skuidlistbyrefidlist
        method: POST
        description: VTex Retrieve SKU ID list by reference ID list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
