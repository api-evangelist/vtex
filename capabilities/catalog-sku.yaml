        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: integer
          description: Product's unique numerical identifier.
          required: true
    - name: api-catalog_system-pvt-sku-stockkeepingunitbyalternateId-alternateId
      path: /api/catalog_system/pvt/sku/stockkeepingunitbyalternateId/{alternateId}
      operations:
      - name: skubyalternateid
