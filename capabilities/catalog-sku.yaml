      path: /api/catalog_system/pvt/sku/stockkeepingunitbyid/{skuId}
      operations:
      - name: skucontext
        method: GET
        description: VTex Get SKU and context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skuId
          in: path
          type: integer
          description: SKU's unique identifier number.
          required: true
        - name: sc
          in: query
          type: integer
          description: Trade policy's unique identifier number.
