naftiko: "1.0.0-alpha1"

info:
  label: "VTEX Orders API"
  description: "Comprehensive order management for VTEX stores covering order lifecycle, invoicing, cancellations, and returns."
  tags:
    - Commerce
    - Fulfillment
    - Order Management
    - Orders
    - VTEX
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VTEX_APP_KEY: VTEX_APP_KEY
      VTEX_APP_TOKEN: VTEX_APP_TOKEN

capability:
  consumes:
    - type: http
      namespace: vtex-orders
      baseUri: "https://{accountName}.vtexcommercestable.com.br"
      description: "VTEX Orders API for managing order lifecycle and fulfillment."
      authentication:
        type: apikey
        key: X-VTEX-API-AppKey
        value: "{{VTEX_APP_KEY}}"
        placement: header
      resources:
        - name: orders
          path: /api/oms/pvt/orders
          description: "Order management operations"
          operations:
            - name: list-orders
              method: GET
              description: "List Orders"
              inputParameters:
                - name: f_status
                  in: query
                  type: string
                  required: false
                  description: "Filter by order status"
                - name: orderBy
                  in: query
                  type: string
                  required: false
                  description: "Order results by field"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-order
              method: GET
              description: "Get Order by ID"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: cancel-order
              method: POST
              description: "Cancel Order"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: send-invoice
              method: POST
              description: "Send Invoice"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.invoiceType}}"
                  invoiceNumber: "{{tools.invoiceNumber}}"
                  invoiceValue: "{{tools.invoiceValue}}"

  exposes:
    - type: rest
      port: 8101
      namespace: vtex-orders-rest
      resources:
        - path: /v1/orders
          name: orders
          description: "Order management"
          operations:
            - method: GET
              name: list-orders
              description: "List orders with filtering"
              call: "vtex-orders.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/orders/{orderId}
          name: order
          description: "Single order operations"
          operations:
            - method: GET
              name: get-order
              description: "Get order by ID"
              call: "vtex-orders.get-order"
              with:
                orderId: "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/orders/{orderId}/cancel
          name: cancel-order
          description: "Order cancellation"
          operations:
            - method: POST
              name: cancel-order
              description: "Cancel an order"
              call: "vtex-orders.cancel-order"
              with:
                orderId: "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/orders/{orderId}/invoices
          name: order-invoices
          description: "Order invoice management"
          operations:
            - method: POST
              name: send-invoice
              description: "Send invoice for an order"
              call: "vtex-orders.send-invoice"
              with:
                orderId: "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: vtex-orders-mcp
      transport: http
      tools:
        - name: list-orders
          description: "List VTEX orders with optional filtering by status, date, and other criteria"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-orders.list-orders"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-order
          description: "Get full details of a VTEX order by order ID"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-orders.get-order"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: cancel-order
          description: "Cancel a VTEX order"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "vtex-orders.cancel-order"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: send-invoice
          description: "Send an invoice for a fulfilled VTEX order"
          hints:
            readOnly: false
            destructive: false
          call: "vtex-orders.send-invoice"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
