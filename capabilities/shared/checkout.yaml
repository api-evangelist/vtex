naftiko: "1.0.0-alpha1"

info:
  label: "VTEX Checkout API"
  description: "Cart and checkout lifecycle management for VTEX storefronts including cart creation, order simulation, and order placement."
  tags:
    - Cart
    - Checkout
    - Commerce
    - Orders
    - VTEX
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VTEX_APP_KEY: VTEX_APP_KEY
      VTEX_APP_TOKEN: VTEX_APP_TOKEN

capability:
  consumes:
    - type: http
      namespace: vtex-checkout
      baseUri: "https://{accountName}.vtexcommercestable.com.br"
      description: "VTEX Checkout API for cart management and order placement."
      authentication:
        type: apikey
        key: X-VTEX-API-AppKey
        value: "{{VTEX_APP_KEY}}"
        placement: header
      resources:
        - name: cart
          path: /api/checkout/pub/orderForm
          description: "Cart and order form management"
          operations:
            - name: create-cart
              method: POST
              description: "Create a New Cart"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-cart
              method: GET
              description: "Get Cart by ID"
              inputParameters:
                - name: orderFormId
                  in: path
                  type: string
                  required: true
                  description: "Cart (order form) identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: simulation
          path: /api/checkout/pub/orderForms/simulation
          description: "Order simulation for price and availability checks"
          operations:
            - name: simulate-order
              method: POST
              description: "Order Simulation"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  items: "{{tools.items}}"
                  country: "{{tools.country}}"
                  postalCode: "{{tools.postalCode}}"

  exposes:
    - type: rest
      port: 8102
      namespace: vtex-checkout-rest
      resources:
        - path: /v1/carts
          name: carts
          description: "Cart management"
          operations:
            - method: POST
              name: create-cart
              description: "Create a new shopping cart"
              call: "vtex-checkout.create-cart"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/carts/{orderFormId}
          name: cart
          description: "Single cart operations"
          operations:
            - method: GET
              name: get-cart
              description: "Get cart by order form ID"
              call: "vtex-checkout.get-cart"
              with:
                orderFormId: "rest.orderFormId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/order-simulation
          name: order-simulation
          description: "Order price and availability simulation"
          operations:
            - method: POST
              name: simulate-order
              description: "Simulate an order for pricing and availability"
              call: "vtex-checkout.simulate-order"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: vtex-checkout-mcp
      transport: http
      tools:
        - name: create-cart
          description: "Create a new VTEX shopping cart"
          hints:
            readOnly: false
            destructive: false
          call: "vtex-checkout.create-cart"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-cart
          description: "Get current state of a VTEX shopping cart"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-checkout.get-cart"
          with:
            orderFormId: "tools.orderFormId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: simulate-order
          description: "Simulate an order to check pricing, shipping options, and availability without placing it"
          hints:
            readOnly: true
            idempotent: false
          call: "vtex-checkout.simulate-order"
          outputParameters:
            - type: object
              mapping: "$."
