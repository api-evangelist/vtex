naftiko: "1.0.0-alpha1"

info:
  label: "VTEX Promotions and Taxes API"
  description: "Discount campaign, coupon, and promotional rule management for VTEX stores."
  tags:
    - Commerce
    - Discounts
    - Promotions
    - Taxes
    - VTEX
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VTEX_APP_KEY: VTEX_APP_KEY
      VTEX_APP_TOKEN: VTEX_APP_TOKEN

capability:
  consumes:
    - type: http
      namespace: vtex-promotions
      baseUri: "https://{accountName}.vtexcommercestable.com.br"
      description: "VTEX Promotions and Taxes API for managing campaigns, coupons, and discounts."
      authentication:
        type: apikey
        key: X-VTEX-API-AppKey
        value: "{{VTEX_APP_KEY}}"
        placement: header
      resources:
        - name: promotions
          path: /api/rnb/pvt/benefits/calculatorconfiguration
          description: "Promotion and campaign management"
          operations:
            - name: list-promotions
              method: GET
              description: "Get All Promotions and Taxes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-promotion
              method: GET
              description: "Get Promotion or Tax by ID"
              inputParameters:
                - name: idCalculatorConfiguration
                  in: path
                  type: string
                  required: true
                  description: "Promotion configuration identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: coupons
          path: /api/rnb/pvt/coupon
          description: "Coupon management"
          operations:
            - name: list-coupons
              method: GET
              description: "Get All Coupons"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

            - name: create-coupon
              method: POST
              description: "Create Coupon"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  utmSource: "{{tools.utmSource}}"
                  quantity: "{{tools.quantity}}"

  exposes:
    - type: rest
      port: 8105
      namespace: vtex-promotions-rest
      resources:
        - path: /v1/promotions
          name: promotions
          description: "Promotion management"
          operations:
            - method: GET
              name: list-promotions
              description: "List all promotions and tax configurations"
              call: "vtex-promotions.list-promotions"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/promotions/{idCalculatorConfiguration}
          name: promotion
          description: "Single promotion operations"
          operations:
            - method: GET
              name: get-promotion
              description: "Get promotion by ID"
              call: "vtex-promotions.get-promotion"
              with:
                idCalculatorConfiguration: "rest.idCalculatorConfiguration"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/coupons
          name: coupons
          description: "Coupon management"
          operations:
            - method: GET
              name: list-coupons
              description: "List all coupons"
              call: "vtex-promotions.list-coupons"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-coupon
              description: "Create a new coupon"
              call: "vtex-promotions.create-coupon"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: vtex-promotions-mcp
      transport: http
      tools:
        - name: list-promotions
          description: "List all active promotions and tax configurations in VTEX"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-promotions.list-promotions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-promotion
          description: "Get full details of a VTEX promotion by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-promotions.get-promotion"
          with:
            idCalculatorConfiguration: "tools.idCalculatorConfiguration"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-coupons
          description: "List all coupons configured in VTEX"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-promotions.list-coupons"
          outputParameters:
            - type: array
              mapping: "$."

        - name: create-coupon
          description: "Create a new discount coupon in VTEX"
          hints:
            readOnly: false
            destructive: false
          call: "vtex-promotions.create-coupon"
          outputParameters:
            - type: object
              mapping: "$."
