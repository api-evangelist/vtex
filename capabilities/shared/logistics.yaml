naftiko: "1.0.0-alpha1"

info:
  label: "VTEX Logistics API"
  description: "Fulfillment infrastructure management for VTEX stores covering warehouses, inventory, carriers, and shipping configuration."
  tags:
    - Commerce
    - Fulfillment
    - Inventory
    - Logistics
    - VTEX
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VTEX_APP_KEY: VTEX_APP_KEY
      VTEX_APP_TOKEN: VTEX_APP_TOKEN

capability:
  consumes:
    - type: http
      namespace: vtex-logistics
      baseUri: "https://{accountName}.vtexcommercestable.com.br"
      description: "VTEX Logistics API for warehouse, inventory, and shipping management."
      authentication:
        type: apikey
        key: X-VTEX-API-AppKey
        value: "{{VTEX_APP_KEY}}"
        placement: header
      resources:
        - name: warehouses
          path: /api/logistics/pvt/configuration/warehouses
          description: "Warehouse management"
          operations:
            - name: list-warehouses
              method: GET
              description: "List Warehouses"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

            - name: get-warehouse
              method: GET
              description: "Get Warehouse by ID"
              inputParameters:
                - name: warehouseId
                  in: path
                  type: string
                  required: true
                  description: "Warehouse identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: inventory
          path: /api/logistics/pvt/inventory/skus
          description: "Inventory management operations"
          operations:
            - name: list-inventory-by-sku
              method: GET
              description: "List Inventory by SKU"
              inputParameters:
                - name: skuId
                  in: path
                  type: string
                  required: true
                  description: "SKU identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-inventory
              method: PUT
              description: "Update Inventory by SKU and Warehouse"
              inputParameters:
                - name: skuId
                  in: path
                  type: string
                  required: true
                  description: "SKU identifier"
                - name: warehouseId
                  in: path
                  type: string
                  required: true
                  description: "Warehouse identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  quantity: "{{tools.quantity}}"

        - name: carriers
          path: /api/logistics/pvt/configuration/carriers
          description: "Shipping carrier management"
          operations:
            - name: list-carriers
              method: GET
              description: "List All Carriers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: vtex-logistics-rest
      resources:
        - path: /v1/warehouses
          name: warehouses
          description: "Warehouse management"
          operations:
            - method: GET
              name: list-warehouses
              description: "List all warehouses"
              call: "vtex-logistics.list-warehouses"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/warehouses/{warehouseId}
          name: warehouse
          description: "Single warehouse operations"
          operations:
            - method: GET
              name: get-warehouse
              description: "Get warehouse by ID"
              call: "vtex-logistics.get-warehouse"
              with:
                warehouseId: "rest.warehouseId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/inventory/skus/{skuId}
          name: sku-inventory
          description: "SKU inventory management"
          operations:
            - method: GET
              name: list-inventory-by-sku
              description: "Get inventory levels for a SKU across all warehouses"
              call: "vtex-logistics.list-inventory-by-sku"
              with:
                skuId: "rest.skuId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/carriers
          name: carriers
          description: "Carrier management"
          operations:
            - method: GET
              name: list-carriers
              description: "List all shipping carriers"
              call: "vtex-logistics.list-carriers"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: vtex-logistics-mcp
      transport: http
      tools:
        - name: list-warehouses
          description: "List all warehouses configured in VTEX logistics"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-logistics.list-warehouses"
          outputParameters:
            - type: array
              mapping: "$."

        - name: get-warehouse
          description: "Get details of a specific VTEX warehouse"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-logistics.get-warehouse"
          with:
            warehouseId: "tools.warehouseId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-inventory-by-sku
          description: "Get inventory levels for a SKU across all warehouses"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-logistics.list-inventory-by-sku"
          with:
            skuId: "tools.skuId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-inventory
          description: "Update inventory quantity for a SKU at a specific warehouse"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "vtex-logistics.update-inventory"
          with:
            skuId: "tools.skuId"
            warehouseId: "tools.warehouseId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-carriers
          description: "List all shipping carriers configured in VTEX"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-logistics.list-carriers"
          outputParameters:
            - type: array
              mapping: "$."
