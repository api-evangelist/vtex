naftiko: "1.0.0-alpha1"

info:
  label: "VTEX Payments Gateway API"
  description: "Payment processing and transaction management for VTEX stores including payment conditions, refunds, and provider integrations."
  tags:
    - Commerce
    - Fintech
    - Payments
    - Transactions
    - VTEX
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VTEX_APP_KEY: VTEX_APP_KEY
      VTEX_APP_TOKEN: VTEX_APP_TOKEN

capability:
  consumes:
    - type: http
      namespace: vtex-payments
      baseUri: "https://{accountName}.vtexpayments.com.br"
      description: "VTEX Payments Gateway API for managing payment transactions and conditions."
      authentication:
        type: apikey
        key: X-VTEX-API-AppKey
        value: "{{VTEX_APP_KEY}}"
        placement: header
      resources:
        - name: transactions
          path: /api/pvt/transactions
          description: "Payment transaction management"
          operations:
            - name: list-transactions
              method: GET
              description: "List Transactions"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: "Page size"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-transaction
              method: GET
              description: "Get Transaction by ID"
              inputParameters:
                - name: transactionId
                  in: path
                  type: string
                  required: true
                  description: "Transaction identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: refunds
          path: /api/pvt/transactions/{transactionId}/refunds
          description: "Payment refund management"
          operations:
            - name: create-refund
              method: POST
              description: "Create Refund"
              inputParameters:
                - name: transactionId
                  in: path
                  type: string
                  required: true
                  description: "Transaction identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  value: "{{tools.amount}}"

  exposes:
    - type: rest
      port: 8104
      namespace: vtex-payments-rest
      resources:
        - path: /v1/transactions
          name: transactions
          description: "Payment transaction management"
          operations:
            - method: GET
              name: list-transactions
              description: "List payment transactions"
              call: "vtex-payments.list-transactions"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/transactions/{transactionId}
          name: transaction
          description: "Single transaction operations"
          operations:
            - method: GET
              name: get-transaction
              description: "Get payment transaction by ID"
              call: "vtex-payments.get-transaction"
              with:
                transactionId: "rest.transactionId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/transactions/{transactionId}/refunds
          name: refunds
          description: "Payment refund management"
          operations:
            - method: POST
              name: create-refund
              description: "Create a refund for a transaction"
              call: "vtex-payments.create-refund"
              with:
                transactionId: "rest.transactionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: vtex-payments-mcp
      transport: http
      tools:
        - name: list-transactions
          description: "List VTEX payment transactions with pagination"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-payments.list-transactions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-transaction
          description: "Get full details of a VTEX payment transaction"
          hints:
            readOnly: true
            idempotent: true
          call: "vtex-payments.get-transaction"
          with:
            transactionId: "tools.transactionId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-refund
          description: "Create a refund for a VTEX payment transaction"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "vtex-payments.create-refund"
          with:
            transactionId: "tools.transactionId"
          outputParameters:
            - type: object
              mapping: "$."
