      path: /api/catalog/pvt/category
      operations:
      - name: post
        method: POST
        description: VTex Create category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-catalog-pvt-category-categoryId
      path: /api/catalog/pvt/category/{categoryId}
      operations:
      - name: get
        method: GET
        description: VTex Get category by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: categoryId
          in: path
