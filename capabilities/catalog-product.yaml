          required: true
    - name: api-catalog_system-pvt-products-productgetbyrefid-refId
      path: /api/catalog_system/pvt/products/productgetbyrefid/{refId}
      operations:
      - name: productbyrefid
        method: GET
        description: VTex Get product by reference ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: refId
          in: path
          type: string
          description: Product reference code.
          required: true
    authentication:
      type: apikey
      key: X-VTEX-API-AppKey
      value: '{{env.VTEX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: catalog-product-rest
    port: 8080
    description: REST adapter for VTex Catalog API — Product. One Spectral-compliant resource per consumed operation, prefixed
