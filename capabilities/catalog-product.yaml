        method: GET
        description: VTex Get product and SKU IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: categoryId
          in: query
          type: integer
          description: ID of the category from which you need to retrieve products and SKUs.
        - name: _from
          in: query
          type: integer
          description: Insert the ID that will start the request result.
        - name: _to
          in: query
          type: integer
          description: Insert the ID that will end the request result.
