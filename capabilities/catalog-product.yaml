      path: /api/catalog_system/pub/products/variations/{productId}
      operations:
      - name: productvariations
        method: GET
        description: VTex Get product's SKUs by product ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
