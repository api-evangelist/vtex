      path: /api/addon/pvt/review/GetProductRate/{productId}
      operations:
      - name: get
        method: GET
        description: VTex Get product review rate by product ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: integer
          description: Product's unique numerical identifier.
          required: true
    - name: api-catalog-pvt-product
      path: /api/catalog/pvt/product
      operations:
      - name: post
        method: POST
        description: VTex Create product with category and brand
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-catalog-pvt-product-productId
      path: /api/catalog/pvt/product/{productId}
      operations:
      - name: getproductbyid
        method: GET
        description: VTex Get product by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: string
          description: Product's unique numerical identifier.
          required: true
      - name: put
        method: PUT
        description: VTex Update product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: integer
          description: Product's unique numerical identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
