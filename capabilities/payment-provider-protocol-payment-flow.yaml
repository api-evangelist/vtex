  - type: http
    namespace: payment-provider-protocol-payment-flow
    baseUri: https://{providerApiEndpoint}
    description: VTex Payment Provider Protocol API — Payment Flow business capability. Self-contained, no shared references.
    resources:
    - name: manifest
      path: /manifest
      operations:
      - name: manifest
        method: GET
        description: VTex List Payment Provider Manifest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payments
      path: /payments
      operations:
      - name: createpayment
        method: POST
        description: VTex Create payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: payments-paymentId-cancellations
      path: /payments/{paymentId}/cancellations
      operations:
      - name: cancelpayment
        method: POST
        description: VTex Cancel payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: payments-paymentId-inbound-action
      path: /payments/{paymentId}/inbound/{action}
      operations:
      - name: inboundrequestbeta
        method: POST
        description: VTex Inbound request (BETA)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: action
          in: path
          type: string
          description: Describes the type of action that will be performed on the route (e.g. hook, enrollment, among others).
            It is the same `:action` information used in the `inboun
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: payments-paymentId-refunds
      path: /payments/{paymentId}/refunds
      operations:
      - name: refundpayment
        method: POST
        description: VTex Refund payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: payments-paymentId-settlements
      path: /payments/{paymentId}/settlements
      operations:
      - name: settlepayment
        method: POST
        description: VTex Settle payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-VTEX-API-AppKey
      value: '{{env.VTEX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payment-provider-protocol-payment-flow-rest
    port: 8080
    description: REST adapter for VTex Payment Provider Protocol API — Payment Flow. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/manifest
      name: manifest
      description: REST surface for manifest.
      operations:
      - method: GET
        name: manifest
        description: VTex List Payment Provider Manifest
        call: payment-provider-protocol-payment-flow.manifest
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments
      name: payments
      description: REST surface for payments.
      operations:
      - method: POST
        name: createpayment
        description: VTex Create payment
        call: payment-provider-protocol-payment-flow.createpayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentid}/cancellations
