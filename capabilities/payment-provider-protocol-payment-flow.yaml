naftiko: 1.0.0-alpha2
info:
  label: VTex Payment Provider Protocol API — Payment Flow
  description: 'VTex Payment Provider Protocol API — Payment Flow. 6 operations. Lead operation: VTex List Payment Provider
    Manifest. Self-contained Naftiko capability covering one Vtex business surface.'
  tags:
  - Vtex
  - Payment Flow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VTEX_API_KEY: VTEX_API_KEY
capability:
