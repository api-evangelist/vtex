      operations:
      - method: POST
        name: inboundrequestbeta
        description: VTex Inbound request (BETA)
        call: payment-provider-protocol-payment-flow.inboundrequestbeta
        with:
          action: rest.action
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentid}/refunds
      name: payments-paymentid-refunds
      description: REST surface for payments-paymentId-refunds.
      operations:
      - method: POST
        name: refundpayment
        description: VTex Refund payment
        call: payment-provider-protocol-payment-flow.refundpayment
