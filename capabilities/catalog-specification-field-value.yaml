naftiko: 1.0.0-alpha2
info:
  label: VTex Catalog API — Specification Field Value
  description: 'VTex Catalog API — Specification Field Value. 4 operations. Lead operation: VTex Get specification values
    by specification field ID. Self-contained Naftiko capability covering one Vtex business surface.'
  tags:
  - Vtex
  - Specification Field Value
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VTEX_API_KEY: VTEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: catalog-specification-field-value
    baseUri: https://{accountName}.{environment}.com.br
    description: VTex Catalog API — Specification Field Value business capability. Self-contained, no shared references.
    resources:
    - name: api-catalog_system-pub-specification-fieldvalue-fieldId
      path: /api/catalog_system/pub/specification/fieldvalue/{fieldId}
      operations:
      - name: specificationsvaluesbyfieldid
        method: GET
        description: VTex Get specification values by specification field ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fieldId
          in: path
          type: integer
          description: Specification field ID.
          required: true
    - name: api-catalog_system-pvt-specification-fieldValue
      path: /api/catalog_system/pvt/specification/fieldValue
      operations:
      - name: specificationsinsertfieldvalue
        method: POST
        description: VTex Create specification field value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: specificationsupdatefieldvalue
        method: PUT
        description: VTex Update specification field value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-catalog_system-pvt-specification-fieldValue-fieldValueId
      path: /api/catalog_system/pvt/specification/fieldValue/{fieldValueId}
      operations:
      - name: specificationsgetfieldvalue
        method: GET
        description: VTex Get specification field value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fieldValueId
          in: path
          type: string
          description: Specification value ID.
          required: true
    authentication:
      type: apikey
      key: X-VTEX-API-AppKey
      value: '{{env.VTEX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: catalog-specification-field-value-rest
    port: 8080
    description: REST adapter for VTex Catalog API — Specification Field Value. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/catalog-system/pub/specification/fieldvalue/{fieldid}
      name: api-catalog-system-pub-specification-fieldvalue-fieldid
      description: REST surface for api-catalog_system-pub-specification-fieldvalue-fieldId.
      operations:
      - method: GET
        name: specificationsvaluesbyfieldid
        description: VTex Get specification values by specification field ID
        call: catalog-specification-field-value.specificationsvaluesbyfieldid
        with:
          fieldId: rest.fieldId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/catalog-system/pvt/specification/fieldvalue
      name: api-catalog-system-pvt-specification-fieldvalue
      description: REST surface for api-catalog_system-pvt-specification-fieldValue.
      operations:
      - method: POST
        name: specificationsinsertfieldvalue
        description: VTex Create specification field value
        call: catalog-specification-field-value.specificationsinsertfieldvalue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: specificationsupdatefieldvalue
        description: VTex Update specification field value
        call: catalog-specification-field-value.specificationsupdatefieldvalue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/catalog-system/pvt/specification/fieldvalue/{fieldvalueid}
      name: api-catalog-system-pvt-specification-fieldvalue-fieldvalueid
      description: REST surface for api-catalog_system-pvt-specification-fieldValue-fieldValueId.
      operations:
      - method: GET
        name: specificationsgetfieldvalue
        description: VTex Get specification field value
        call: catalog-specification-field-value.specificationsgetfieldvalue
        with:
          fieldValueId: rest.fieldValueId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: catalog-specification-field-value-mcp
    port: 9090
    transport: http
    description: MCP adapter for VTex Catalog API — Specification Field Value. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: vtex-get-specification-values-specification
      description: VTex Get specification values by specification field ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: catalog-specification-field-value.specificationsvaluesbyfieldid
      with:
        fieldId: tools.fieldId
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-create-specification-field-value
      description: VTex Create specification field value
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: catalog-specification-field-value.specificationsinsertfieldvalue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-update-specification-field-value
      description: VTex Update specification field value
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: catalog-specification-field-value.specificationsupdatefieldvalue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-get-specification-field-value
      description: VTex Get specification field value
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: catalog-specification-field-value.specificationsgetfieldvalue
      with:
        fieldValueId: tools.fieldValueId
      outputParameters:
      - type: object
        mapping: $.
