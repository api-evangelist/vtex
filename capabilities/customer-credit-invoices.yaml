        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-search-all-invoices
      description: VTex Search all invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: customer-credit-invoices.searchallinvoices
      with:
        from: tools.from
