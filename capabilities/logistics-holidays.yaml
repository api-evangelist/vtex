naftiko: 1.0.0-alpha2
info:
  label: VTex Logistics API — Holidays
  description: 'VTex Logistics API — Holidays. 4 operations. Lead operation: VTex List all holidays. Self-contained Naftiko
    capability covering one Vtex business surface.'
  tags:
  - Vtex
  - Holidays
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VTEX_API_KEY: VTEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: logistics-holidays
    baseUri: https://{accountName}.{environment}.com.br
    description: VTex Logistics API — Holidays business capability. Self-contained, no shared references.
    resources:
    - name: api-logistics-pvt-configuration-holidays
      path: /api/logistics/pvt/configuration/holidays
      operations:
      - name: allholidays
        method: GET
        description: VTex List all holidays
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
          description: Type of the content being sent.
          required: true
        - name: Accept
          in: header
          type: string
          description: HTTP Client Negotiation Accept Header. Indicates the types of responses the client can understand.
          required: true
    - name: api-logistics-pvt-configuration-holidays-holidayId
      path: /api/logistics/pvt/configuration/holidays/{holidayId}
      operations:
      - name: createupdateholiday
        method: PUT
        description: VTex Create/update holiday
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
          description: HTTP Client Negotiation Accept Header. Indicates the types of responses the client can understand.
          required: true
        - name: Content-Type
          in: header
          type: string
          description: Type of the content being sent.
          required: true
        - name: holidayId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: holidaybyid
        method: GET
        description: VTex List holiday by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
          description: Type of the content being sent.
          required: true
        - name: Accept
          in: header
          type: string
          description: HTTP Client Negotiation Accept Header. Indicates the types of responses the client can understand.
          required: true
        - name: holidayId
          in: path
          type: string
          required: true
      - name: holiday
        method: DELETE
        description: VTex Delete holiday
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
          description: Type of the content being sent.
          required: true
        - name: Accept
          in: header
          type: string
          description: HTTP Client Negotiation Accept Header. Indicates the types of responses the client can understand.
          required: true
        - name: holidayId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-VTEX-API-AppKey
      value: '{{env.VTEX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: logistics-holidays-rest
    port: 8080
    description: REST adapter for VTex Logistics API — Holidays. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/logistics/pvt/configuration/holidays
      name: api-logistics-pvt-configuration-holidays
      description: REST surface for api-logistics-pvt-configuration-holidays.
      operations:
      - method: GET
        name: allholidays
        description: VTex List all holidays
        call: logistics-holidays.allholidays
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/logistics/pvt/configuration/holidays/{holidayid}
      name: api-logistics-pvt-configuration-holidays-holidayid
      description: REST surface for api-logistics-pvt-configuration-holidays-holidayId.
      operations:
      - method: PUT
        name: createupdateholiday
        description: VTex Create/update holiday
        call: logistics-holidays.createupdateholiday
        with:
          Accept: rest.Accept
          Content-Type: rest.Content-Type
          holidayId: rest.holidayId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: holidaybyid
        description: VTex List holiday by ID
        call: logistics-holidays.holidaybyid
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
          holidayId: rest.holidayId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: holiday
        description: VTex Delete holiday
        call: logistics-holidays.holiday
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
          holidayId: rest.holidayId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: logistics-holidays-mcp
    port: 9090
    transport: http
    description: MCP adapter for VTex Logistics API — Holidays. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: vtex-list-all-holidays
      description: VTex List all holidays
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: logistics-holidays.allholidays
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-create-update-holiday
      description: VTex Create/update holiday
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: logistics-holidays.createupdateholiday
      with:
        Accept: tools.Accept
        Content-Type: tools.Content-Type
        holidayId: tools.holidayId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-list-holiday-id
      description: VTex List holiday by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: logistics-holidays.holidaybyid
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        holidayId: tools.holidayId
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-delete-holiday
      description: VTex Delete holiday
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: logistics-holidays.holiday
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        holidayId: tools.holidayId
      outputParameters:
      - type: object
        mapping: $.
