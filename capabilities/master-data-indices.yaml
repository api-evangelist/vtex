        mapping: $.
    - name: vtex-get-index-name
      description: VTex Get index by name
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: master-data-indices.getindexbyname
      outputParameters:
      - type: object
        mapping: $.
    - name: vtex-delete-index-name
      description: VTex Delete index by name
      hints:
