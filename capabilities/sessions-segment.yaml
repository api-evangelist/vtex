naftiko: 1.0.0-alpha2
info:
  label: VTex Session Manager API — Segment
  description: 'VTex Session Manager API — Segment. 1 operations. Lead operation: VTex Get segment. Self-contained Naftiko
    capability covering one Vtex business surface.'
  tags:
  - Vtex
  - Segment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VTEX_API_KEY: VTEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: sessions-segment
    baseUri: https://{accountName}.{environment}.com.br
    description: VTex Session Manager API — Segment business capability. Self-contained, no shared references.
    resources:
    - name: api-segments
      path: /api/segments
      operations:
      - name: getsegment
        method: GET
        description: VTex Get segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: vtex_session
      value: '{{env.VTEX_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: sessions-segment-rest
    port: 8080
    description: REST adapter for VTex Session Manager API — Segment. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/segments
      name: api-segments
      description: REST surface for api-segments.
      operations:
      - method: GET
        name: getsegment
        description: VTex Get segment
        call: sessions-segment.getsegment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sessions-segment-mcp
    port: 9090
    transport: http
    description: MCP adapter for VTex Session Manager API — Segment. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: vtex-get-segment
      description: VTex Get segment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sessions-segment.getsegment
      outputParameters:
      - type: object
        mapping: $.
