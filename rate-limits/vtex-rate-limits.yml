specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: VTEX
providerId: vtex
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - E-Commerce
description: VTEX APIs enforce per-account, per-endpoint rate limits.
sources:
  - https://www.vtex.com/pricing/
  - https://developers.vtex.com/docs/guides/api-rate-limit
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Default REST API
    scope: account
    metric: requests_per_minute
    limit: 5000
    timeFrame: minute
    notes: Endpoint-specific limits also apply
  - name: Catalog API
    scope: account
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
  - name: Search API
    scope: account
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
  - name: Order Management
    scope: account
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
