aid: vtex
url: https://raw.githubusercontent.com/api-evangelist/vtex/refs/heads/main/apis.yml
name: VTEX
description: VTEX is a global enterprise digital commerce platform that provides end-to-end solutions for businesses to create,
  manage, and scale their online stores. Founded in Brazil, VTEX serves thousands of merchants across 38 countries with capabilities
  spanning catalog management, checkout, payments, logistics, marketplace, promotions, search, and customer identity. The
  platform offers an extensive API ecosystem enabling headless commerce, composable architectures, and deep integrations with
  third-party tools and marketplaces.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Commerce
  - E-Commerce
  - Retail
  - Marketplace
  - Payments
