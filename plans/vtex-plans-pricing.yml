specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: VTEX
providerId: vtex
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - E-Commerce
  - Composable Commerce
  - B2B
description: VTEX subscription + GMV-based pricing. Starts $250-$500/mo + transaction fees.
sources:
  - https://www.vtex.com/pricing/
plans:
  - id: vtex-starter
    name: Starter Subscription
    type: paid
    description: $250-$500/month minimum + GMV-based transaction fees.
    entries:
      - label: Monthly minimum
        name: monthly_min
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: 250.00-500.00
        userMultiplied: false
      - label: Per-sale transaction fee
        name: gmv_fee
        type: metered
        metric: USD_GMV
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: varies (% of GMV)
        userMultiplied: false
    elements:
      - name: B2C/B2B Commerce Platform
      - name: OMS, PIM, Storefront
      - name: Marketplace integrations
  - id: vtex-enterprise
    name: Enterprise (Avg $134K/year)
    type: enterprise
    description: Outcome-based pricing tied to GMV. Avg enterprise spend $134K/year.
    entries:
      - label: Annual (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: $134K avg
        userMultiplied: false
    elements:
      - name: Outcome-based GMV pricing
      - name: B2B + Marketplace
      - name: Retail Media (separate)
      - name: AI commerce features
      - name: Global expansion support
